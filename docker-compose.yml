version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: techkraft_user
      POSTGRES_PASSWORD: techkraft_password
      POSTGRES_DB: techkraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://techkraft_user:techkraft_password@db:5432/techkraft
      - PORT=3000

volumes:
  postgres_data: